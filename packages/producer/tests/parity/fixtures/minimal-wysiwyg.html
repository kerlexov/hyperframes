<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parity Fixture</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script data-hyperframes-preview-runtime="1" src="hyperframe.runtime.iife.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 640px;
        height: 360px;
        overflow: hidden;
        background: #0f172a;
      }

      #root {
        width: 640px;
        height: 360px;
        position: relative;
        overflow: hidden;
      }

      #animated-card {
        position: absolute;
        top: 80px;
        left: 180px;
        width: 280px;
        height: 200px;
        border-radius: 0px;
        background: linear-gradient(135deg, #06b6d4, #6366f1);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main-video"
      data-width="640"
      data-height="360"
      data-duration="2"
      data-fps="30"
    >
      <div id="animated-card" data-start="0"></div>
    </div>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        tl.to("#animated-card", {
          borderRadius: "48px",
          x: 50,
          duration: 1,
          ease: "none",
        });
        tl.to("#animated-card", {
          borderRadius: "12px",
          x: 0,
          duration: 1,
          ease: "none",
        });
        window.__timelines = window.__timelines || {};
        window.__timelines["main-video"] = tl;
      })();
    </script>
  </body>
</html>
